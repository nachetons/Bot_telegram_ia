services:
  ai-agent:
    build: .
    container_name: ai-agent
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/app
    ports:
      - "18000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app
      - ./data:/app/data
      - /media/casaos/Library/PYTHON/Agent:/repo
    restart: always
